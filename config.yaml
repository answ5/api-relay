# ============================
# API Relay 配置
# ============================

server:
  host: "0.0.0.0"
  port: 8000
  debug: false

database:
  url: "mysql+aiomysql://relay:***@localhost:3306/relay?charset=utf8mb4"
  pool_size: 10
  max_overflow: 20

redis:
  host: "localhost"
  port: 6379
  db: 0
  password: ""

auth:
  # API Key 前缀
  key_prefix: "sk-"
  # 管理后台 JWT 密钥
  jwt_secret: "change-me-in-production"
  jwt_expire_hours: 24
  # 是否允许用户注册
  allow_register: true

payload:
  enabled: true
  retention_days: 30
  max_size_mb: 10

logging:
  level: "INFO"
  # 异步日志队列
  log_queue: "log_queue"
  payload_queue: "payload_queue"
  batch_size: 100
  batch_interval_sec: 1

rate_limiter:
  default_rate_per_minute: 100
  redis_prefix: "ratelimit"

# ============================
# 插件配置
# ============================
plugins:
  enabled:
    - payment_manual
    - payment_epay
    - payment_stripe
    - cards
    - subscription
    - coupon
    - ticket
    - moderation
    - channel_lb
    - rate_limit_tier
    - finance_report
  disabled: []
  settings:
    payment_epay:
      epay_api_url: ""
      epay_app_id: ""
      epay_app_key: ""
    payment_stripe:
      stripe_secret_key: ""
      stripe_webhook_secret: ""
      stripe_currency: "usd"
    subscription:
      auto_renew_grace_hours: 24
      free_tier_quota: 100000
    rate_limit_tier:
      rate_limit_default_rpm: 60
      rate_limit_admin_rpm: 1000
      rate_limit_vip_rpm: 300
    moderation:
      moderation_enabled: 1
